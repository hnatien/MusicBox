services:
  music-box:
    container_name: music-box
    build:
      context: .
      dockerfile: Dockerfile
    image: music-box:prod
    env_file:
      - .env
    environment:
      NODE_ENV: production
      YOUTUBE_COOKIE_FILE: ${YOUTUBE_COOKIE_FILE:-/run/secrets/youtube-cookies.txt}
    volumes:
      - ./secrets:/run/secrets:ro
    restart: unless-stopped